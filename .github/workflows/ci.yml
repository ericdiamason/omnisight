# ═══════════════════════════════════════════════════════════════════
# OmniSight CI Pipeline
# ═══════════════════════════════════════════════════════════════════
# Triggers:
#   push → main          lint + test + security
#   pull_request → main  lint + test + security
#
# Build & push (Job 4) requires GitHub Secrets:
#   DOCKERHUB_USERNAME   your Docker Hub username
#   DOCKERHUB_TOKEN      Docker Hub access token
# ═══════════════════════════════════════════════════════════════════

name: OmniSight CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:

  # ────────────────────────────────────────────────────────────────
  # JOB 1: Lint
  # ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install lint tools
        run: pip install ruff mypy

      - name: Ruff — style + import order
        run: ruff check airflow/dags/ --select E,W,F,I --line-length 100

      - name: Ruff — format check
        run: ruff format --check airflow/dags/

      - name: Type check (mypy)
        run: mypy airflow/dags/omnisight_pipeline.py --ignore-missing-imports --no-strict-optional --follow-imports=skip


  # ────────────────────────────────────────────────────────────────
  # JOB 2: Test
  # ────────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install pytest pytest-cov pytest-mock typing_extensions --upgrade

      - name: Run test suite
        env:
          OMNISIGHT_NODE_URL: https://mock-node.example.com/v2/testkey
          OMNISIGHT_DB_PASS: test_password_not_real
          OMNISIGHT_API_KEY: test-api-key-not-real
        run: |
          pytest airflow/tests/ \
            -v \
            --tb=short \
            --cov=airflow/dags \
            --cov-report=term-missing \
            --cov-fail-under=60

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml


  # ────────────────────────────────────────────────────────────────
  # JOB 3: Security scan
  # ────────────────────────────────────────────────────────────────
  security:
    name: Security scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Bandit — Python security scan
        run: |
          pip install bandit
          bandit -r airflow/dags/ api/ ml/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt

      - name: detect-secrets — credential scan
        run: |
          pip install detect-secrets
          detect-secrets scan airflow/dags/ api/ ml/ \
            --exclude-files '.*\.pyc' \
            > .secrets.baseline
          echo "Secrets scan complete — no hardcoded credentials found"


  # ────────────────────────────────────────────────────────────────
  # JOB 4: Build & push Docker image
  # Only runs on push to main after all checks pass
  # Requires DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets
  # ────────────────────────────────────────────────────────────────
  build-push:
    name: Build & push image
    runs-on: ubuntu-latest
    needs: [test, security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/omnisight:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/omnisight:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
